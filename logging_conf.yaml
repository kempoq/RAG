version: 1
disable_existing_loggers: False
formatters:
  default:
    format: "%(asctime)s - [%(levelname)s] - %(module)s - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  uvicorn_formatter:
    format: "%(asctime)s - [%(levelname)s] - %(module)s - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  error:
    format: "%(asctime)s - [%(levelname)s] - %(name)s - (%(filename)s).%(funcName)s(%(lineno)d): %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
handlers:
  verbose_output:
    formatter: default
    level: DEBUG
    class: logging.StreamHandler
    stream: ext://sys.stdout
  uvicorn_handler:
    formatter: uvicorn_formatter
    level: INFO
    class: logging.StreamHandler
    stream: ext://sys.stdout
loggers:
  app:
    level: INFO
    handlers:
      - verbose_output
    propagate: false
  uvicorn.access: &uvicorn_logger
    level: INFO
    handlers:
      - uvicorn_handler
    propagate: false
  uvicorn.error: *uvicorn_logger
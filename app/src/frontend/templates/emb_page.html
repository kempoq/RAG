<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="/static/js/emb_page.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="bg-white border-b border-slate-200 shrink-0 z-50">
        <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-brain text-white text-sm"></i>
                    </div>
                    <span class="font-bold text-xl text-slate-900">RAG Studio</span>
                </div>
                <div class="flex items-center gap-1">
                    <a href="/embedding" class="px-4 py-2 rounded-lg bg-indigo-50 text-indigo-700 font-medium text-sm">Upload</a>
                    <a href="/simple-rag" class="px-4 py-2 rounded-lg text-slate-600 hover:bg-slate-50 font-medium text-sm transition-colors">Simple RAG</a>
                    <a href="/graph-rag" class="px-4 py-2 rounded-lg text-slate-600 hover:bg-slate-50 font-medium text-sm transition-colors">Graph RAG</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-slate-900">Knowledge Base</h1>
            <p class="text-slate-500 mt-1">Upload files to embed and index them for retrieval.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Left Column: Upload + Document List -->
            <div class="lg:col-span-2 space-y-6">
                
                <!-- Upload Card -->
                <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
                    <h2 class="text-lg font-semibold text-slate-900 mb-4">Upload Files</h2>
                    
                    <!-- Drop Zone -->
                    <div 
                        id="drop-zone"
                        class="border-2 border-dashed border-slate-300 rounded-lg p-10 text-center hover:border-indigo-400 hover:bg-indigo-50/30 transition-colors cursor-pointer"
                    >
                        <div class="w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i class="fa-solid fa-cloud-arrow-up text-indigo-600 text-lg"></i>
                        </div>
                        <p class="text-sm font-medium text-slate-700">Drag & drop files here</p>
                        <p class="text-xs text-slate-500 mt-1">or click to browse</p>
                        <p class="text-xs text-slate-400 mt-2">TXT — up to 50MB each</p>
                    </div>

                    <input type="file" id="file-input" multiple accept=".pdf,.txt,.docx,.md" class="hidden">

                    <!-- Selected Files List (appears inside upload card) -->
                    <div id="selected-files" class="hidden mt-4 space-y-2"></div>

                    <!-- Upload Button -->
                    <div id="upload-action" class="hidden mt-4">
                        <button
                            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition-colors text-sm"
                            id="uploadButton"
                        >
                            Embed
                        </button>
                    </div>

                    <div class="flex gap-2 mt-4">
                        <span class="px-3 py-1 rounded-full bg-slate-100 text-xs font-medium text-slate-600">TXT</span>
                    </div>
                </div>

                <!-- Document List (MVP: no status, no delete buttons) -->
                <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="px-6 py-4 border-b border-slate-100">
                        <h2 class="text-lg font-semibold text-slate-900">Embedded Files</h2>
                    </div>
                    <div class="h-64 divide-y divide-slate-100 overflow-y-auto" id="documentsList">
                        <p class="text-center p-4">Empty</p>
                    </div>
                </div>

            </div>

            <!-- Right Column: Only Vector Store Stats -->
            <div class="space-y-6">
                <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
                    <h3 class="text-sm font-semibold text-slate-900 uppercase tracking-wider mb-4">Vector Store</h3>
                    
                    <div class="space-y-8">

                        <div class="flex justify-between text-sm mb-1">
                            <span class="text-slate-600">Total Documents</span>
                            <span class="font-semibold text-slate-900" id="totalDocumentsValue"></span>
                        </div>

                        <div class="pt-2 border-t border-slate-100">
                            <div class="flex justify-between text-sm">
                                <span class="text-slate-600">Embedding Model</span>
                                <span class="font-medium text-slate-900" id="embeddingModelName"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    {% include 'loader.html' %}
</body>
</html>

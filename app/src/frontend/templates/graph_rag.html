<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <script type="module" src="/static/js/graph_rag.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
</head>
<body class="bg-slate-50 h-screen flex flex-col overflow-hidden">

    <!-- Navigation -->
    <nav class="bg-white border-b border-slate-200 shrink-0 z-50">
        <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-brain text-white text-sm"></i>
                    </div>
                    <span class="font-bold text-xl text-slate-900">RAG Studio</span>
                </div>
                <div class="flex items-center gap-1">
                    <a href="/embedding" class="px-4 py-2 rounded-lg text-slate-600 hover:bg-slate-50 font-medium text-sm transition-colors">Upload</a>
                    <a href="/simple-rag" class="px-4 py-2 rounded-lg text-slate-600 hover:bg-slate-50 font-medium text-sm transition-colors">Simple RAG</a>
                    <a href="/graph-rag" class="px-4 py-2 rounded-lg bg-indigo-50 text-indigo-700 font-medium text-sm">Graph RAG</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Content + Input Wrapper -->
    <div class="flex-1 flex flex-col justify-center max-w-4xl mx-auto w-full px-4 sm:px-6 lg:px-8 overflow-hidden">

        <!-- Scrollable Content Area -->
        <div id="answerArea" class="flex-1 overflow-y-auto py-6 space-y-4 hidden">

            <!-- Answer Output -->
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 sm:p-8">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center">
                        <i class="fa-solid fa-robot text-indigo-600 text-sm"></i>
                    </div>
                    <h3 class="text-sm font-semibold text-slate-900">Answer</h3>
                </div>
                <div id="answerOutput" class="prose prose-slate prose-sm max-w-none"></div>
            </div>

            <!-- Toggle Button -->
            <div class="flex justify-center">
                <button 
                    id="toggleButton" 
                    class="flex items-center gap-2 px-4 py-2 rounded-full bg-white border border-slate-200 text-sm font-medium text-slate-600 hover:border-indigo-300 hover:text-indigo-600 transition-all shadow-sm"
                >
                    <i id="toggleIcon" class="fa-solid fa-chevron-down text-xs transition-transform"></i>
                    <span id="toggleLabel">Show graph context</span>
                </button>
            </div>

            <!-- Graph Context Block (Hidden by default) -->
            <div id="context" class="hidden bg-indigo-50/60 rounded-2xl border border-indigo-100 p-6 sm:p-8">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center">
                        <i class="fa-solid fa-circle-nodes text-indigo-600 text-sm"></i>
                    </div>
                    <h3 class="text-sm font-semibold text-indigo-900">Graph Context</h3>
                    <span class="ml-auto text-xs font-medium text-indigo-700 bg-white px-2.5 py-1 rounded-lg border border-indigo-100">Sent to LLM</span>
                </div>
                
                <div class="space-y-3">
                    <div class="bg-white rounded-xl border border-indigo-100/80 p-4">
                        <p class="text-xs font-semibold text-indigo-400 uppercase tracking-wider mb-2">Info from Neo4j</p>
                        
                        <!-- Truncated text (always visible) -->
                        <p id="graphDbShortOutput" class="text-sm text-slate-700 whitespace-pre-wrap leading-relaxed"></p>
                        
                        <!-- Expand button -->
                        <button 
                            id="expandButton"
                            class="mt-3 flex items-center gap-1.5 text-xs font-medium text-indigo-600 hover:text-indigo-800 transition-colors"
                        >
                            <span>Show full summary</span>
                            <i class="fa-solid fa-arrow-down"></i>
                        </button>
                    </div>

                    <!-- Retrieved Subgraph -->
                    <div class="bg-white rounded-xl border border-indigo-100/80 p-4">
                        <p class="text-xs font-semibold text-indigo-400 uppercase tracking-wider mb-3">Cypher query</p>
                        <p id="cypherQueryOutput" class="text-sm text-slate-700 whitespace-pre-line leading-relaxed"></p>
                    </div>

                    <div class="bg-white rounded-xl border border-indigo-100/80 p-4">
                        <p class="text-xs font-semibold text-indigo-400 uppercase tracking-wider mb-2">User Question</p>
                        <p id="queryOutput" class="text-sm text-slate-800 font-medium"></p>
                    </div>

                    <div class="bg-white rounded-xl border border-indigo-100/80 p-4">
                        <p class="text-xs font-semibold text-indigo-400 uppercase tracking-wider mb-2">Token usage</p>
                        <p id="tokenUsageOutput" class="text-sm text-slate-700 leading-relaxed"></p>
                    </div>

                </div>
            </div>

        </div>

        <!-- Fixed Input Bar -->
        <div class="shrink-0 bg-white border-t border-slate-200 py-4">
            <div class="flex gap-3">
                <input 
                    id="userInput"
                    type="text" 
                    placeholder="Ask a question ..." 
                    class="flex-1 rounded-xl border border-slate-300 px-4 py-3 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                >
                <button
                    id="sendButton"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl px-5 py-3 text-sm font-medium transition-colors flex items-center gap-2 shrink-0"
                >
                    <span>Send</span>
                    <i class="fa-solid fa-paper-plane text-xs"></i>
                </button>
            </div>
        </div>

    </div>

    <div id="communityModal" class="fixed inset-0 z-[100] hidden">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm"></div>
        
        <!-- Modal content -->
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[80vh] flex flex-col">
                <!-- Header -->
                <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center">
                            <i class="fa-solid fa-circle-nodes text-indigo-600 text-sm"></i>
                        </div>
                        <h3 class="text-sm font-semibold text-slate-900">Info from Neo4j — Full Text</h3>
                    </div>
                    <button
                        id="modalCloseButton"
                        class="text-slate-400 hover:text-slate-600 transition-colors"
                    >
                        <i class="fa-solid fa-xmark text-lg"></i>
                    </button>
                </div>
                
                <!-- Body -->
                <div class="flex-1 overflow-y-auto px-6 py-5">
                    <div class="space-y-4">
                       <p id="graphDbFullOutput" class="text-sm text-slate-700 whitespace-pre-wrap leading-relaxed"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    {% include 'loader.html' %}
</body>
</html>
